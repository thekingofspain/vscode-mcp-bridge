tool: rename_symbol
description: Rename a symbol and all its references across the workspace
category: lsp
version: 1.0.0
stability: stable

input:
  filePath:
    type: string
    description: Absolute path to the file
    required: true
  line:
    type: number
    description: Line number (0-indexed)
    required: true
    constraints:
      min: 0
  character:
    type: number
    description: Character position (0-indexed)
    required: true
    constraints:
      min: 0
  newName:
    type: string
    description: The new name for the symbol
    required: true

output:
  type: object
  properties:
    filesChanged: number
    editsApplied: number

handler:
  module: handler.ts
  function: execute

dependencies:
  - vscode-api/languages/references.renameSymbol

examples:
  - name: Rename symbol
    input:
      filePath: /path/to/file.ts
      line: 10
      character: 5
      newName: newVariableName

metadata:
  relatedTools:
    - find_references
