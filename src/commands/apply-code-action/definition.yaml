tool: apply_code_action
description: Apply a code action by index (get index from get_code_actions first)
category: lsp
version: 1.0.0
stability: stable

input:
  filePath:
    type: string
    description: Absolute path to the file
    required: true
  startLine:
    type: number
    description: Start line (0-indexed)
    required: true
    constraints:
      min: 0
  startChar:
    type: number
    description: Start character (0-indexed)
    required: true
    constraints:
      min: 0
  endLine:
    type: number
    description: End line (0-indexed)
    required: true
    constraints:
      min: 0
  endChar:
    type: number
    description: End character (0-indexed)
    required: true
    constraints:
      min: 0
  actionIndex:
    type: number
    description: Index from get_code_actions result
    required: true
    constraints:
      min: 0

output:
  type: object
  properties:
    applied: boolean
    title: string

handler:
  module: handler.ts
  function: execute

dependencies:
  - vscode-api/languages/codeactions.applyCodeAction

examples:
  - name: Apply code action
    input:
      filePath: /path/to/file.ts
      startLine: 10
      startChar: 0
      endLine: 10
      endChar: 50
      actionIndex: 0

metadata:
  relatedTools:
    - get_code_actions
