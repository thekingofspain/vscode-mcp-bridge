tool: find_references
description: Find all references to a symbol at a given position using LSP
category: lsp
version: 1.0.0
stability: stable

input:
  filePath:
    type: string
    description: Absolute path to the file
    required: true
  line:
    type: number
    description: Line number (0-indexed)
    required: true
    constraints:
      min: 0
  character:
    type: number
    description: Character position (0-indexed)
    required: true
    constraints:
      min: 0
  includeDeclaration:
    type: boolean
    description: Include declaration in results
    required: false
    default: true

output:
  type: array
  items:
    type: object

handler:
  module: handler.ts
  function: execute

dependencies:
  - vscode-api/languages/references.getReferences

examples:
  - name: Find references
    input:
      filePath: /path/to/file.ts
      line: 10
      character: 5

metadata:
  relatedTools:
    - go_to_definition
