tool: go_to_type_definition
description: Get the type definition location(s) of a symbol at a given position using LSP
category: lsp
version: 1.0.0
stability: stable

input:
  filePath:
    type: string
    description: Absolute path to the file
    required: true
  line:
    type: number
    description: Line number (0-indexed)
    required: true
    constraints:
      min: 0
  character:
    type: number
    description: Character position (0-indexed)
    required: true
    constraints:
      min: 0

output:
  type: array
  items:
    type: object

handler:
  module: handler.ts
  function: execute

dependencies:
  - vscode-api/languages/definitions.getTypeDefinition

examples:
  - name: Go to type definition
    input:
      filePath: /path/to/file.ts
      line: 10
      character: 5

metadata:
  relatedTools:
    - go_to_definition
    - go_to_implementation
