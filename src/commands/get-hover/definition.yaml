tool: get_hover
description: Get hover information (type info, documentation) for a symbol at a given position
category: lsp
version: 1.0.0
stability: stable

input:
  filePath:
    type: string
    description: Absolute path to the file
    required: true
  line:
    type: number
    description: Line number (0-indexed)
    required: true
    constraints:
      min: 0
  character:
    type: number
    description: Character position (0-indexed)
    required: true
    constraints:
      min: 0

output:
  type: object
  properties:
    contents: array

handler:
  module: handler.ts
  function: execute

dependencies:
  - vscode-api/languages/hover.getHover

examples:
  - name: Get hover info
    input:
      filePath: /path/to/file.ts
      line: 10
      character: 5

metadata:
  relatedTools:
    - get_signature_help
